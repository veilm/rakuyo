<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rakuyo</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Rakuyo</h1>
        <div id="location"></div>
      </div>
      <div class="topbar-actions">
        <select id="rootSelect"></select>
        <button id="upBtn" type="button">Up</button>
        <button id="logoutBtn" type="button">Logout</button>
      </div>
    </header>

    <main>
      <section id="loginPanel" class="panel hidden">
        <h2>Login</h2>
        <form id="loginForm">
          <label>
            Password
            <input type="password" id="passwordInput" autocomplete="current-password" />
          </label>
          <button type="submit">Enter</button>
        </form>
        <p id="loginError" class="error"></p>
      </section>

      <section id="browserPanel" class="panel hidden">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Type</th>
              <th>Size</th>
              <th>Modified</th>
            </tr>
          </thead>
          <tbody id="entries"></tbody>
        </table>
      </section>
    </main>

    <div id="viewerModal" class="viewerModal hidden" aria-hidden="true">
      <div class="viewerBackdrop"></div>
      <div class="viewerCard">
        <div class="viewerTop">
          <div id="viewerTitle"></div>
          <button id="viewerClose" type="button">Close</button>
        </div>
        <div id="viewerBody" class="viewerBody"></div>
      </div>
    </div>

    <template id="rowTemplate">
      <tr>
        <td class="nameCell">
          <div class="itemWrap">
            <img class="thumb" alt="" />
            <a class="entryLink" href="#"></a>
          </div>
        </td>
        <td class="typeCell"></td>
        <td class="sizeCell"></td>
        <td class="timeCell"></td>
      </tr>
    </template>

    <script src="/static/app.js"></script>
  </body>
</html>
